		<div class="main-view">
			<header class="header">
				<h2 class="header__title">Brew</h2>
				<span class="header__text">Your daily caffeine</span>
			</header>
			<div class="intake">
				<div class="progress-bar">
					<div class="progress-bar__outer">
						<div class="progress-bar__inner">
							<h1 class="progress-bar__caffeine">145</h1>
							<span class="progress-bar__label">mg</span>
						</div>
					</div>
					<svg class="progress-bar__svg" width="300px" height="300px">
						<circle class="progress-bar__circle" cx="150" cy="150" r="140" />
					</svg>
				</div>

				<div class="intake-limit">
					<span class="intake-limit__label">234 mg untill daily limit </span>
				</div>

				<div class="caffeine-monitor">
					<span class="caffeine-monitor__label">~67mg in the system</span>
					<div class="caffeine-monitor__bar">
						<svg
							class="caffeine-monitor__bar-svg"
							viewBox="0 0 100 10"
							preserveAspectRatio="none"
						>
							<rect
								class="caffeine-monitor__fill"
								width="50"
								height="10"
								rx="5"
							/>
						</svg>
					</div>
					<div class="caffeine-monitor__sleep">
						<span class="caffeine-monitor__label">Safe to sleep:</span>
						<span class="caffeine-monitor__value">22:30 (1:45)</span>
					</div>
				</div>
